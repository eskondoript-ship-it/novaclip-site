<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip Trend Spotter</title>
<style>
  body { background:var(--bg); color:var(--txt); font-family:'Segoe UI',sans-serif; margin-left:200px; }
  .wrap { padding:40px 20px; text-align:center; }
  h1 { font-size:3rem; background:linear-gradient(90deg,#4CC9F0,#7209B7); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .radar { width:320px; height:320px; margin:30px auto; border-radius:50%; background:radial-gradient(circle, rgba(76,201,240,0.15) 0%, transparent 70%); border:4px solid #4CC9F0; box-shadow:0 0 60px #4CC9F0; position:relative; overflow:hidden; }
  .sweep { position:absolute; inset:0; background:conic-gradient(from 0deg, transparent 0deg, #4CC9F0 30deg, transparent 60deg); animation:sweep 1.8s linear infinite; }
  @keyframes sweep { to { transform:rotate(360deg); } }
  input, button { padding:14px; margin:10px; border-radius:12px; font-size:1.1rem; }
  button { background:linear-gradient(#f72585,#7209B7); border:none; color:white; font-weight:700; }
  #out { margin-top:30px; background:var(--box); padding:20px; border-radius:16px; min-height:200px; text-align:left; white-space:pre-wrap; }
</style>
</head>
<body>
  <div class='sidebar'>... (same as above)</div>
  <div class='wrap'>
    <h1>🛰️ TREND SPOTTER</h1>
    <p style="opacity:0.8;max-width:500px;margin:20px auto;">Scan the future. NovaClip AI predicts what's about to explode.</p>
    <input id='niche' placeholder='Your niche (Minecraft, cooking, football...)'>
    <button onclick="scan()">SCAN FOR TRENDS</button>
    <div id='out'></div>
  </div>

  <script src='nova.js'></script>
  <script>
    const WORKER_URL = 'https://novaclip-ai.eskondori-pt.workers.dev';
    async function scan() {
      const niche = document.getElementById('niche').value || 'gaming';
      const out = document.getElementById('out');
      out.innerHTML = 'Scanning the future... 🛰️';
      // Call your worker here (same as before)
      out.innerHTML = 'Future trends loaded! 🔥';
    }
  </script>
</body>
</html>
