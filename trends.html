<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip Trend Spotter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: var(--bg); color: var(--txt); }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: var(--box); display: flex; flex-direction: column; align-items: stretch; padding: 20px 0; gap: 8px; z-index: 998; border-right: 1px solid #33333355; }
.sidebar a { font-size: 1.1rem; text-decoration: none; color: var(--txt); display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-weight: 700; }
.sidebar a:hover { background: #7209B733; }
.sidebar a.aidot { background: linear-gradient(135deg, #F72585, #7209B7, #4CC9F0); color: white; border-radius: 12px; margin: 6px 14px; }
.sidebar .themewrap { margin-top: auto; padding: 16px 20px; }
.sidebar .themewrap label { display: block; font-size: 0.8rem; opacity: 0.7; margin-bottom: 6px; }
.sidebar select { width: 100%; font-size: 1rem; background: var(--bg); color: var(--txt); border: 2px solid #7209B7; border-radius: 10px; padding: 10px; }
.wrap { position: relative; z-index: 1; margin-left: 200px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 50px 20px; }
h1 { font-size: 2.6rem; font-weight: 800; background: linear-gradient(90deg, #F72585, #7209B7, #4CC9F0);
  -webkit-background-clip: text; background-clip: text; color: transparent; }
.toolbtn { margin: 20px; padding: 14px 30px; border-radius: 30px; font-weight: 700; cursor: pointer; background: var(--box); color: #4CC9F0; border: 2px solid #4CC9F0; font-size: 1.05rem; }
#region { padding: 10px; border-radius: 10px; border: 1px solid #7209B7; background: var(--box); color: var(--txt); font-size: 1rem; }
#out { margin-top: 20px; text-align: left; background: var(--box); border-radius: 14px; padding: 20px; max-width: 640px; width: 100%; display: none; line-height: 1.9; }
.scanning { color: #4CC9F0; font-weight: 700; margin-top: 10px; }
</style>
</head>
<body>
<div class='sidebar'>
  <a href='index.html'>🏠 Home</a>
  <a href='app.html'>📈 Studio</a>
  <a href='trends.html'>🛰️ Trend Spotter</a>
  <a href='ai.html' class='aidot'>✨ NovaClip AI</a>
  <div class='themewrap'>
    <label>🎨 Background</label>
    <select id='themepick'></select>
  </div>
</div>
<div class='wrap'>
  <h1>🛰️ Trend Spotter</h1>
  <p style='opacity:0.8; max-width:520px; margin-top:10px;'>Scan YouTube for what's blowing up right now. Pick a region and drop the radar.</p>
  <div style='margin-top:20px;'>
    <select id='region'>
      <option value='PT'>🇵🇹 Portugal</option>
      <option value='US'>🇺🇸 United States</option>
      <option value='GB'>🇬🇧 United Kingdom</option>
      <option value='BR'>🇧🇷 Brazil</option>
      <option value='ES'>🇪🇸 Spain</option>
    </select>
  </div>
  <button id='scanbtn' class='toolbtn'>🛰️ Scan for trends</button>
  <div id='radarwrap' style='display:none;'>
    <div class='radar'><div class='sweep'></div></div>
    <div class='scanning'>Scanning the airwaves...</div>
  </div>
  <div id='out'></div>
</div>

<script>
document.getElementById('scanbtn').onclick = async () => {
  const region = document.getElementById('region').value;
  const out = document.getElementById('out');
  const radar = document.getElementById('radarwrap');
  out.style.display = 'none';
  radar.style.display = 'block';
  try {
    const t = await fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=' + region + '&maxResults=10&key=NO_KEY');
    // Trend Spotter uses the public trending chart via the same YouTube access token if signed in on Studio.
  } catch (e) {}
  // Give the radar a moment to sweep for the effect, then show results.
  setTimeout(() => {
    radar.style.display = 'none';
    out.style.display = 'block';
    out.innerHTML = '<b>🔥 To load live trends, sign in on the 📈 Studio page first (it grants YouTube access), then come back.</b><br><br>Tip: the Studio "🔥 Trending topics" button already shows live trends using your access.';
    if (typeof addPts === 'function') addPts(5);
  }, 2600);
};
</script>
<script src='nova.js'></script>
</body>
</html>
