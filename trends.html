<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip Trend Spotter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: var(--bg); color: var(--txt); }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: var(--box); display: flex; flex-direction: column; align-items: stretch; padding: 20px 0; gap: 8px; z-index: 998; border-right: 1px solid #33333355; }
.sidebar a { font-size: 1.1rem; text-decoration: none; color: var(--txt); display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-weight: 700; }
.sidebar a:hover { background: #7209B733; }
.sidebar a.aidot { background: linear-gradient(135deg, #F72585, #7209B7, #4CC9F0); color: white; border-radius: 12px; margin: 6px 14px; }
.sidebar .themewrap { margin-top: auto; padding: 16px 20px; }
.sidebar .themewrap label { display: block; font-size: 0.8rem; opacity: 0.7; margin-bottom: 6px; }
.sidebar select { width: 100%; font-size: 1rem; background: var(--bg); color: var(--txt); border: 2px solid #7209B7; border-radius: 10px; padding: 10px; }
.wrap { position: relative; z-index: 1; margin-left: 200px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 50px 20px; }
h1 { font-size: 2.6rem; font-weight: 800; background: linear-gradient(90deg, #F72585, #7209B7, #4CC9F0);
  -webkit-background-clip: text; background-clip: text; color: transparent; }
.toolbtn { margin: 20px; padding: 14px 30px; border-radius: 30px; font-weight: 700; cursor: pointer; background: var(--box); color: #4CC9F0; border: 2px solid #4CC9F0; font-size: 1.05rem; }
#niche { padding: 10px; border-radius: 10px; border: 1px solid #7209B7; background: var(--box); color: var(--txt); font-size: 1rem; width: 300px; max-width: 90%; }
#out { margin-top: 20px; text-align: left; background: var(--box); border-radius: 14px; padding: 20px; max-width: 640px; width: 100%; display: none; line-height: 1.9; white-space: pre-wrap; }
#radarwrap { position: fixed; top: 0; left: 200px; right: 0; bottom: 0; background: radial-gradient(circle, #0a1520 0%, #05080d 100%); z-index: 900; display: none; flex-direction: column; align-items: center; justify-content: center; }
body.navclosed #radarwrap { left: 0; }
.bigradar { width: 60vmin; height: 60vmin; border-radius: 50%; position: relative; background: radial-gradient(circle, rgba(76,201,240,0.12) 0%, rgba(5,8,13,0.7) 70%); border: 2px solid rgba(76,201,240,0.5); box-shadow: 0 0 40px rgba(76,201,240,0.3) inset; overflow: hidden; }
.bigradar::before, .bigradar::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(76,201,240,0.25); margin: 12%; }
.bigradar::after { margin: 26%; }
.bigradar .sweep { position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(from 0deg, rgba(76,201,240,0.55) 0deg, rgba(76,201,240,0) 60deg, transparent 360deg); animation: ncsweep 1.6s linear infinite; }
.blip { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #ff3b3b; box-shadow: 0 0 12px 3px rgba(255,59,59,0.8); opacity: 0; animation: blip 3.2s ease-in-out infinite; }
@keyframes ncsweep { to { transform: rotate(360deg); } }
@keyframes blip { 0%, 100% { opacity: 0; } 15% { opacity: 1; } 55% { opacity: 0.3; } }
.scanning { margin-top: 26px; font-size: 1.3rem; letter-spacing: 2px; color: #4CC9F0; font-weight: 700; }
</style>
</head>
<body>
<div class='sidebar'>
  <a href='index.html' data-t='home'>🏠 Home</a>
  <a href='app.html' data-t='studio'>📈 Studio</a>
  <a href='trends.html' data-t='trends'>🛰️ Trend Spotter</a>
  <a href='ai.html' class='aidot' data-t='ai'>✨ NovaClip AI</a>
  <div class='themewrap'>
    <label>🎨 Background</label>
    <select id='themepick'></select>
    <label style='margin-top:12px;'>🌐 Language</label>
    <select id='langpick'></select>
  </div>
</div>
<div class='wrap'>
  <h1>🛰️ Trend Spotter</h1>
  <p style='opacity:0.8; max-width:520px; margin-top:10px;'>Type your niche and drop the radar - NovaClip AI predicts what's about to blow up.</p>
  <div style='margin-top:20px;'>
    <input id='niche' placeholder='Your niche (e.g. Minecraft, cooking, football)'>
  </div>
  <button id='scanbtn' class='toolbtn'>🛰️ Scan for trends</button>
  <div id='out'></div>
</div>

<div id='radarwrap'>
  <div class='bigradar' id='bigradar'><div class='sweep'></div></div>
  <div class='scanning'>Scanning the airwaves...</div>
</div>

<script>
const WORKER_URL = 'https://novaclip-ai.YOURNAME.workers.dev';

function dropBlips() {
  const r = document.getElementById('bigradar');
  r.querySelectorAll('.blip').forEach(b => b.remove());
  for (let i = 0; i < 6; i++) {
    const b = document.createElement('div');
    b.className = 'blip';
    b.style.left = (15 + Math.random() * 70) + '%';
    b.style.top = (15 + Math.random() * 70) + '%';
    b.style.animationDelay = (Math.random() * 2) + 's';
    r.appendChild(b);
  }
}

document.getElementById('scanbtn').onclick = async () => {
  const niche = document.getElementById('niche').value || 'YouTube';
  const out = document.getElementById('out');
  const radar = document.getElementById('radarwrap');
  out.style.display = 'none';
  radar.style.display = 'flex';
  dropBlips();

  const prompt = 'You are NovaClip trend analyst. For the niche "' + niche + '", list 6 video topic trends rising right now and about to blow up. For each: a catchy title idea and one line on why it works. Use emojis. Be specific and punchy.' + (typeof langInstruction === 'function' ? langInstruction() : '');

  const aiPromise = fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'gemini-2.5-flash', payload: { contents: [{ parts: [{ text: prompt }] }] } })
  }).then(r => r.json()).then(data => {
    return (data.candidates && data.candidates[0] && data.candidates[0].content.parts[0].text) || null;
  }).catch(() => null);

  const minWait = new Promise(res => setTimeout(res, 2500));
  const [text] = await Promise.all([aiPromise, minWait]);

  radar.style.display = 'none';
  out.style.display = 'block';
  if (text) {
    out.textContent = text;
    if (typeof addPts === 'function') addPts(5);
  } else {
    out.textContent = 'The trend radar could not reach the AI 💀\n\nCheck 1) your WORKER_URL is your real Cloudflare address, 2) the Worker CORS allows this site. Open F12 Console and look for a red CORS or 404 line.';
  }
};
</script>
<script src='nova.js'></script>
</body>
</html>
