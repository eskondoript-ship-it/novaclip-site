<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Roof Sniper 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<style>
  body { margin:0; overflow:hidden; }
  #ui { position:absolute; top:10px; left:10px; color:white; z-index:100; }
</style>
</head>
<body>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
  </div>

  <script>
    // Simple realistic 3D game with keyboard + mouse look
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // Add lights, roofs, player model (cylinder for body)
    const player = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2, 16), new THREE.MeshLambertMaterial({color: 0x00ff88}));
    scene.add(player);

    camera.position.set(0, 5, 10);
    camera.lookAt(player.position);

    let move = { forward: false, backward: false, left: false, right: false };

    document.addEventListener('keydown', e => {
      if (e.key === 'w' || e.key === 'W') move.forward = true;
      if (e.key === 's' || e.key === 'S') move.backward = true;
      if (e.key === 'a' || e.key === 'A') move.left = true;
      if (e.key === 'd' || e.key === 'D') move.right = true;
      if (e.key === ' ') jump();
    });

    document.addEventListener('keyup', e => {
      if (e.key === 'w' || e.key === 'W') move.forward = false;
      if (e.key === 's' || e.key === 'S') move.backward = false;
      if (e.key === 'a' || e.key === 'A') move.left = false;
      if (e.key === 'd' || e.key === 'D') move.right = false;
    });

    function jump() {
      // Add jump logic
    }

    function animate() {
      requestAnimationFrame(animate);
      // Movement and camera logic
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
