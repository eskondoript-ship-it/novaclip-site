<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip Editor</title>
<style>
  body { background:var(--bg); color:var(--txt); margin-left:200px; font-family:'Segoe UI',sans-serif; }
  .stage { display:grid; grid-template-columns:1fr 380px; gap:20px; padding:20px; }
  #preview { width:100%; background:#000; border-radius:12px; border:3px solid #7209B7; }
  .panel { background:var(--box); padding:18px; border-radius:14px; margin-bottom:16px; }
  button { padding:10px 20px; margin:4px; border-radius:999px; font-weight:700; }
</style>
</head>
<body>
  <div class='sidebar'>... (keep sidebar)</div>
  <div class='stage'>
    <div>
      <canvas id='preview' width='1280' height='720'></canvas>
      <div>
        <button onclick="playPreview()">▶️ Play</button>
        <button onclick="startRecording()">⏺️ Record Video</button>
      </div>
      <div id='timeline' style="display:flex; gap:8px; overflow-x:auto; margin-top:20px;"></div>
    </div>

    <div>
      <div class='panel'>
        <h3>Add Clips / Images</h3>
        <input type="file" id="mediaInput" accept="image/*,video/*" multiple>
      </div>
      <!-- Add text, music, etc. panels -->
    </div>
  </div>

  <script src='nova.js'></script>
  <script>
    // Simple but working preview + recording
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');
    let clips = [];

    document.getElementById('mediaInput').onchange = e => {
      [...e.target.files].forEach(file => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.src = url;
        img.onload = () => {
          clips.push(img);
          renderTimeline();
        };
      });
    };

    function renderTimeline() {
      // Simple timeline with thumbnails
      const tl = document.getElementById('timeline');
      tl.innerHTML = clips.map((c,i) => `<img src="${c.src}" style="height:80px; margin:4px; border-radius:6px;">`).join('');
    }

    function playPreview() {
      let i = 0;
      const interval = setInterval(() => {
        if (i >= clips.length) { clearInterval(interval); return; }
        ctx.drawImage(clips[i], 0, 0, canvas.width, canvas.height);
        i++;
      }, 1500);
    }

    async function startRecording() {
      const stream = canvas.captureStream(30);
      const recorder = new MediaRecorder(stream);
      const chunks = [];
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = () => {
        const blob = new Blob(chunks, {type: 'video/webm'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'novaclip-edit.webm'; a.click();
      };
      recorder.start();
      playPreview(); // play while recording
      setTimeout(() => recorder.stop(), 8000); // 8 seconds example
    }
  </script>
</body>
</html>
