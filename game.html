<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0, user-scalable=no'>
<title>ROOF SNIPER 3D - NovaClip</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; touch-action:none; }
  canvas { display:block; }
  #ui { position:absolute; top:10px; left:10px; color:#fff; z-index:100; font-size:1.3rem; text-shadow:0 0 10px #000; pointer-events:none; }
  #controls { position:absolute; bottom:15px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); padding:12px 25px; border-radius:50px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; z-index:100; }
  button { padding:14px 24px; background:#f72585; color:white; border:none; border-radius:50px; font-weight:800; cursor:pointer; font-size:1.05rem; min-width:70px; }
</style>
</head>
<body>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Health: <span id="health">100</span></div>
    <div id="weapon">Sniper</div>
  </div>

  <div id="controls">
    <button onclick="jump()">↑ JUMP</button>
    <button onclick="shoot()">🔫 SHOOT</button>
    <button onclick="throwGrenade()">💣 GRENADE</button>
    <button onclick="plantC4()">💥 C4</button>
    <button onclick="toggleView()">👁️ VIEW</button>
  </div>

  <script src='nova.js'></script>
  <script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a0f1a, 20, 180);
    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 300);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x99aadd, 0.7));
    const sun = new THREE.DirectionalLight(0xffeecc, 1.4);
    sun.position.set(50, 100, 60);
    scene.add(sun);

    let player = { health: 100, money: 1500, score: 0, weapon: 'sniper' };

    let bullets = [];
    let explosions = [];
    let enemies = [];
    let roofs = [];
    let isFirstPerson = true;

    // Roofs
    for (let i = -15; i < 25; i++) {
      const roof = new THREE.Mesh(new THREE.BoxGeometry(16, 1.8, 10), new THREE.MeshLambertMaterial({color: 0x334455}));
      roof.position.set(i*17, 2 + Math.random()*9, -25);
      scene.add(roof);
      roofs.push(roof);
    }

    const playerMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2, 16), new THREE.MeshLambertMaterial({color: 0x00ffcc}));
    scene.add(playerMesh);

    camera.position.set(12, 18, 38);

    function playSound(type) {
      const a = new Audio();
      if (type === 'shot') a.src = 'https://freesound.org/data/previews/276/276951_5123854-lq.mp3';
      else if (type === 'explosion') a.src = 'https://freesound.org/data/previews/66/66920_931655-lq.mp3';
      a.volume = 0.75;
      a.play().catch(()=>{});
    }

    function createExplosion(pos, big = false) {
      playSound('explosion');
      const flash = new THREE.Mesh(new THREE.SphereGeometry(big?12:6, 32, 32), new THREE.MeshBasicMaterial({color: 0xff8800}));
      flash.position.copy(pos);
      scene.add(flash);
      explosions.push({mesh: flash, life: big?50:25});
    }

    function shoot() {
      playSound('shot');
      const b = new THREE.Mesh(new THREE.SphereGeometry(player.weapon === 'rpg' ? 0.8 : 0.25, 16, 16), 
        new THREE.MeshBasicMaterial({color: player.weapon === 'rpg' ? 0xff4400 : 0xffff00}));
      b.position.copy(playerMesh.position);
      b.position.y += 2.2;
      b.velocity = new THREE.Vector3(6, 3, -35);
      b.isRPG = player.weapon === 'rpg';
      scene.add(b);
      bullets.push(b);

      if (b.isRPG) {
        setTimeout(() => {
          if (b.parent) createExplosion(b.position, true);
          scene.remove(b);
        }, 900);
      }
    }

    function throwGrenade() {
      const g = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshBasicMaterial({color: 0x00cc00}));
      g.position.copy(playerMesh.position);
      g.position.y += 4;
      g.velocity = new THREE.Vector3(12, 16, -25);
      scene.add(g);
      bullets.push(g);
      setTimeout(() => { if (g.parent) createExplosion(g.position); scene.remove(g); }, 1100);
    }

    function plantC4() {
      const c4 = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.6, 1.3), new THREE.MeshLambertMaterial({color: 0x333333}));
      c4.position.copy(playerMesh.position);
      c4.position.y -= 1;
      scene.add(c4);
      setTimeout(() => { createExplosion(c4.position, true); scene.remove(c4); }, 2600);
    }

    function jump() {
      if (playerMesh.position.y < 12) playerMesh.position.y += 14;
    }

    function toggleView() {
      isFirstPerson = !isFirstPerson;
    }

    function animate() {
      requestAnimationFrame(animate);

      if (isFirstPerson) {
        camera.position.set(playerMesh.position.x, playerMesh.position.y + 2.5, playerMesh.position.z + 4);
      } else {
        camera.position.set(playerMesh.position.x + 12, playerMesh.position.y + 14, playerMesh.position.z + 28);
      }
      camera.lookAt(playerMesh.position.x, playerMesh.position.y + 3, playerMesh.position.z - 15);

      for (let i = bullets.length-1; i >= 0; i--) {
        let b = bullets[i];
        b.position.addScaledVector(b.velocity || new THREE.Vector3(0,0,-30), 0.06);
      }

      for (let i = explosions.length-1; i >= 0; i--) {
        let e = explosions[i];
        e.life--;
        if (e.life <= 0) { scene.remove(e.mesh); explosions.splice(i,1); }
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
