<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip AI</title>
<style>
  body { background:var(--bg); color:var(--txt); font-family:'Segoe UI',sans-serif; margin-left:200px; display:flex; flex-direction:column; height:100vh; }
  .sidebar { position:fixed; left:0; top:0; bottom:0; width:200px; background:var(--box); z-index:998; padding:20px 0; border-right:1px solid #333; }
  header { padding:20px; background:var(--accent); font-size:1.6rem; font-weight:800; }
  #aiout { flex:1; padding:24px; overflow-y:auto; }
  textarea, select { width:100%; padding:16px; margin:10px 0; border-radius:12px; background:var(--box); color:var(--txt); border:2px solid #7209B7; }
  button { padding:14px 28px; background:#f72585; color:white; border:none; border-radius:50px; font-weight:700; margin:5px; }
</style>
</head>
<body>
  <div class='sidebar'>... (same sidebar as above)</div>
  <header>✨ NovaClip AI</header>
  <div id='aiout'>Choose a tutor and ask anything...</div>
  <div style="padding:20px; border-top:1px solid #333;">
    <select id='subject'>
      <option value='youtube'>🎬 YouTube Coach</option>
      <option value='space'>☄️ Space Tutor</option>
      <option value='business'>💼 Business Tutor</option>
    </select>
    <textarea id='askbox' rows='3' placeholder='Ask anything...'></textarea>
    <button onclick="sendMessage()">💬 Send</button>
    <button onclick="generateThumbnail()">🎨 Thumbnail</button>
    <button onclick="generateVideoPlan()">🎬 Video Plan</button>
  </div>

  <script src='nova.js'></script>

    async function sendMessage() { /* ... */ }
  </script>
</body>
</html>
