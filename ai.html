<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip AI</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--txt); font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; height:100vh; margin-left:200px; }
  .sidebar { position:fixed; left:0; top:0; bottom:0; width:200px; background:var(--box); ... } /* keep your existing sidebar styles */
  header { padding:20px 24px; background:linear-gradient(90deg,#F72585,#7209B7,#4CC9F0); font-size:1.4rem; font-weight:800; }
  #aiout { flex:1; padding:24px; overflow-y:auto; line-height:1.7; font-size:1.05rem; }
  .message { margin:15px 0; padding:16px; border-radius:16px; max-width:80%; }
  .user { background:#7209B733; margin-left:auto; }
  .ai { background:var(--box); }
  textarea, select { width:100%; padding:14px; border-radius:12px; border:2px solid #7209B7; background:var(--box); color:var(--txt); }
  button { padding:12px 24px; border:none; border-radius:9999px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>
  <!-- Sidebar (same as before) -->
  <div class='sidebar'>...</div>

  <header>✨ NovaClip AI</header>
  <div id='aiout'>Choose a tutor and start chatting!</div>

  <div style="padding:16px 24px; border-top:1px solid #333;">
    <select id='subject'>
      <option value='youtube'>🎬 YouTube Coach</option>
      <option value='space'>☄️ Space Tutor</option>
      <option value='business'>💼 Business Tutor</option>
    </select>
    <textarea id='askbox' rows='3' placeholder='Ask anything...'></textarea>
    <div style="margin-top:12px;">
      <button onclick="sendMessage()">💬 Send</button>
      <button onclick="generateThumbnail()">🎨 Thumbnail</button>
      <button onclick="generateVideoPlan()">🎬 Video Plan</button>
    </div>
  </div>

  <script src='nova.js'></script>
  <script>
    const WORKER_URL = 'https://novaclip-ai.eskondori-pt.workers.dev';

    async function askGemini(payload) {
      const r = await fetch(WORKER_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
      return r.json();
    }

    async function sendMessage() {
      const q = document.getElementById('askbox').value.trim();
      if (!q) return;
      addMessage(q, 'user');
      const out = document.getElementById('aiout');
      out.innerHTML += `<div class="message ai">Thinking...</div>`;
      // ... call Gemini with persona (same as before)
      document.getElementById('askbox').value = '';
    }

    // Add similar functions for thumbnail and video plan with nice loading animations
  </script>
</body>
</html>
