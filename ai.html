<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
body { background: #060608; color: #f4f4f6; display: flex; flex-direction: column; height: 100vh; margin-left: 200px; overflow: hidden; }

.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: rgba(12,12,16,0.85); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: stretch; padding: 20px 0; gap: 8px; z-index: 998; border-right: 1px solid rgba(255,255,255,0.06); }
.sidebar a { font-size: 1.05rem; text-decoration: none; color: #f4f4f6; display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-weight: 600; transition: background 0.2s; }
.sidebar a:hover { background: rgba(114,9,183,0.25); }
.sidebar a.aidot { background: linear-gradient(135deg, #F72585, #7209B7, #4CC9F0); color: white; border-radius: 12px; margin: 6px 14px; }
.sidebar .themewrap { margin-top: auto; padding: 16px 20px; }
.sidebar .themewrap label { display: block; font-size: 0.78rem; opacity: 0.6; margin-bottom: 6px; }
.sidebar select { width: 100%; font-size: 0.95rem; background: rgba(255,255,255,0.05); color: #f4f4f6; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 9px; }

#orbs { position: fixed; inset: 0; left: 200px; z-index: 0; pointer-events: none; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.4; }
.orb.a { width: 420px; height: 420px; background: #7209B7; top: -80px; left: 20%; animation: f1 15s ease-in-out infinite; }
.orb.b { width: 360px; height: 360px; background: #F72585; bottom: -60px; right: 8%; animation: f2 18s ease-in-out infinite; }
@keyframes f1 { 0%,100% { transform: translate(0,0);} 50% { transform: translate(50px,60px);} }
@keyframes f2 { 0%,100% { transform: translate(0,0);} 50% { transform: translate(-60px,-40px);} }

header { position: relative; z-index: 2; padding: 20px 28px; font-weight: 800; font-size: 1.4rem; }
header .grad { background: linear-gradient(90deg, #F72585, #7209B7, #4CC9F0); -webkit-background-clip: text; background-clip: text; color: transparent; }

#panels { position: relative; z-index: 2; padding: 0 28px 10px; max-width: 820px; width: 100%; margin: 0 auto; display: flex; gap: 10px; flex-wrap: wrap; }
details { background: rgba(255,255,255,0.04); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 10px 16px; flex: 1; min-width: 200px; }
summary { cursor: pointer; font-weight: 700; }
details div { margin-top: 8px; font-size: 0.88rem; line-height: 1.6; opacity: 0.85; }

#aiout { position: relative; z-index: 2; flex: 1; overflow-y: auto; padding: 20px 28px; white-space: pre-wrap; font-size: 1.02rem; line-height: 1.7; max-width: 820px; width: 100%; margin: 0 auto; }
#aiout .msg { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; }
#aiimg { position: relative; z-index: 2; max-width: 500px; width: 90%; border-radius: 16px; margin: 16px auto; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

#controls { position: relative; z-index: 2; padding: 16px 28px 22px; border-top: 1px solid rgba(255,255,255,0.08); max-width: 820px; width: 100%; margin: 0 auto; background: rgba(6,6,8,0.6); backdrop-filter: blur(10px); }
#subject { width: 100%; padding: 11px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #f4f4f6; margin-bottom: 10px; font-size: 0.95rem; }
#askbox { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #f4f4f6; resize: none; font-size: 1rem; }
#askbox:focus { outline: none; border-color: #7209B7; }
.smallbtn { margin-top: 10px; margin-right: 8px; padding: 12px 22px; border-radius: 30px; border: none; cursor: pointer; font-weight: 700; color: white; background: linear-gradient(90deg, #F72585, #7209B7); font-size: 0.95rem; transition: transform 0.2s, box-shadow 0.2s; }
.smallbtn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(247,37,133,0.4); }
.smallbtn.alt { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class='sidebar'>
  <a href='index.html' data-t='home'>🏠 Home</a>
  <a href='app.html' data-t='studio'>📈 Studio</a>
  <a href='trends.html' data-t='trends'>🛰️ Trend Spotter</a>
  <a href='editor.html'>🎬 Editor</a>
  <a href='game.html'>🎯 Sniper</a>
  <a href='ai.html' class='aidot' data-t='ai'>✨ NovaClip AI</a>
  <div class='themewrap'>
    <label data-t='background'>Background</label>
    <select id='themepick'></select>
    <label style='margin-top:12px;' data-t='language'>Language</label>
    <select id='langpick'></select>
  </div>
</div>

<div id='orbs'><div class='orb a'></div><div class='orb b'></div></div>

<header><span class='grad' data-t='ai_h'>✨ NovaClip AI</span></header>
<div id='panels'>
  <details><summary data-t='quests'>🎁 Rewards</summary><div id='questlist'></div></details>
  <details><summary data-t='achievements'>🏅 Achievements</summary><div id='achlist'></div></details>
  <details><summary data-t='history'>📜 History</summary><div id='histlist'></div></details>
</div>
<div id='aiout'><div class='msg'>Yo! Pick your tutor, then ask away (+5 pts), cook a thumbnail with 🎨 (+10 pts), or plan a whole video with 🎬 (+10 pts) fr fr</div></div>
<img id='aiimg'>
<div id='controls'>
  <select id='subject'>
    <option value='youtube'>🎬 YouTube Coach</option>
    <option value='space'>☄️ Asteroid Tutor</option>
    <option value='business'>💼 Business Tutor</option>
  </select>
  <textarea id='askbox' rows='2' placeholder='Ask NovaClip anything...'></textarea>
  <div>
    <button id='askbtn' class='smallbtn' data-t='ask'>💬 Ask</button>
    <button id='thumbbtn' class='smallbtn alt' data-t='thumb'>🎨 Thumbnail</button>
    <button id='vidbtn' class='smallbtn alt' data-t='video'>🎬 Video maker</button>
  </div>
</div>

<script>
const WORKER_URL = 'https://novaclip-ai.eskondori-pt.workers.dev';

async function askGemini(model, payload) {
  const r = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: model, payload: payload }) });
  return r.json();
}
function setOut(text) { document.getElementById('aiout').innerHTML = '<div class="msg">' + text.replace(/</g,'&lt;') + '</div>'; }

const SLANG = 'Talk in HEAVY gen z slang: fr fr, no cap, ong, lowkey, highkey, W, L, bet, rizz, cooked, ate, slay, bussin, deadass, its giving, valid, hits different, goated, sheesh, sigma, delulu. Pack slang into almost every sentence but keep it readable and actually helpful. Use emojis. ';
const PERSONAS = {
  youtube: 'You are NovaClip, a YouTube coach for teen creators 13-18, expert in titles, trends and growth hacks. ',
  space: 'You are NovaClip, a fun space tutor for teens, expert in asteroids, planets and NASA missions. ',
  business: 'You are NovaClip, a business and money tutor for teens, expert in side hustles, saving and entrepreneurship. '
};
function persona() { return PERSONAS[document.getElementById('subject').value] + SLANG + (typeof langInstruction === 'function' ? langInstruction() : ''); }
function subjectName() { return document.getElementById('subject').selectedOptions[0].textContent; }

document.getElementById('askbtn').onclick = async () => {
  const q = document.getElementById('askbox').value;
  if (!q) return;
  document.getElementById('aiimg').style.display = 'none';
  setOut('Cooking... 🔥');
  const data = await askGemini('gemini-2.5-flash', { contents: [{ parts: [{ text: persona() + 'Keep it under 200 words. Question: ' + q }] }] });
  if (data.candidates && data.candidates[0].content.parts[0].text) {
    setOut(data.candidates[0].content.parts[0].text);
    saveHist(subjectName(), q, data.candidates[0].content.parts[0].text);
    addPts(5);
  } else { setOut('The AI is cooked rn 💀 try again in a minute.'); }
};

document.getElementById('thumbbtn').onclick = async () => {
  const q = document.getElementById('askbox').value || 'exciting gaming video';
  setOut('Painting your thumbnail... (10-20s) 🎨');
  const data = await askGemini('gemini-2.5-flash-image', { contents: [{ parts: [{ text: 'Generate a bold YouTube thumbnail image, 16:9, vivid colors, high contrast, about: ' + q }] }] });
  let done = false;
  if (data.candidates) {
    for (const p of data.candidates[0].content.parts) {
      if (p.inlineData) {
        const img = document.getElementById('aiimg');
        img.src = 'data:image/png;base64,' + p.inlineData.data;
        img.style.display = 'block';
        setOut('It ate. Right-click to save it 🔥');
        saveHist(subjectName(), 'Thumbnail: ' + q, 'image generated');
        addPts(10);
        done = true;
      }
    }
  }
  if (!done) setOut('Could not generate the image rn 💀 (image model may be busy). Try again in a minute.');
};

document.getElementById('vidbtn').onclick = async () => {
  const q = document.getElementById('askbox').value;
  if (!q) { setOut('Type your video idea first, then hit 🎬'); return; }
  document.getElementById('aiimg').style.display = 'none';
  setOut('Directing your video... 🎬');
  const data = await askGemini('gemini-2.5-flash', { contents: [{ parts: [{ text: persona() + 'Create a complete video plan for this idea: ' + q + '. Give me: 1) A viral title, 2) A 3-second hook line, 3) Full script outline scene by scene, 4) Shot list with camera angles, 5) Music and sound effect suggestions, 6) A thumbnail concept. Format it clearly with the numbers.' }] }] });
  if (data.candidates && data.candidates[0].content.parts[0].text) {
    setOut(data.candidates[0].content.parts[0].text);
    saveHist(subjectName(), 'Video plan: ' + q, data.candidates[0].content.parts[0].text);
    addPts(10);
  } else { setOut('The AI is cooked rn 💀 try again in a minute.'); }
};
</script>
<script src='nova.js'></script>
</body>
</html>
