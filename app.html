<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip Studio</title>
<script src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: var(--bg); color: var(--txt); }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: var(--box); display: flex; flex-direction: column; align-items: stretch; padding: 20px 0; gap: 8px; z-index: 998; border-right: 1px solid #33333355; }
.sidebar a { font-size: 1.1rem; text-decoration: none; color: var(--txt); display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-weight: 700; }
.sidebar a:hover { background: #7209B733; }
.sidebar a.aidot { background: linear-gradient(135deg, #F72585, #7209B7, #4CC9F0); color: white; border-radius: 12px; margin: 6px 14px; }
.sidebar .themewrap { margin-top: auto; padding: 16px 20px; }
.sidebar .themewrap label { display: block; font-size: 0.8rem; opacity: 0.7; margin-bottom: 6px; }
.sidebar select { width: 100%; font-size: 1rem; background: var(--bg); color: var(--txt); border: 2px solid #7209B7; border-radius: 10px; padding: 10px; }
.hero { position: relative; z-index: 1; min-height: 100vh; margin-left: 200px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; text-align: center; padding: 50px 20px; }
h1 { font-size: 2.6rem; font-weight: 800; background: linear-gradient(90deg, #F72585, #7209B7, #4CC9F0);
  -webkit-background-clip: text; background-clip: text; color: transparent; }
.toolbtn { margin: 6px; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; background: var(--box); color: #4CC9F0; border: 2px solid #4CC9F0; }
.panelbox { margin-top: 16px; text-align: left; display: none; background: var(--box); border-radius: 14px; padding: 16px; max-width: 680px; width: 100%; }
#duelbox { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #7209B7; background: var(--bg); color: var(--txt); }
.smallbtn { margin-top: 8px; padding: 8px 14px; border-radius: 20px; border: none; cursor: pointer; font-weight: 700; color: white; background: linear-gradient(90deg, #F72585, #7209B7); }
.toggle { display: inline-flex; align-items: center; gap: 8px; margin: 10px 0; font-weight: 700; cursor: pointer; }
.toggle input { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class='sidebar'>
  <a href='index.html' data-t='home'>🏠 Home</a>
  <a href='app.html' data-t='studio'>📈 Studio</a>
  <a href='trends.html' data-t='trends'>🛰️ Trend Spotter</a>
  <a href='ai.html' class='aidot' data-t='ai'>✨ NovaClip AI</a>
  <div class='themewrap'>
    <label>🎨 Background</label>
    <select id='themepick'></select>
    <label style='margin-top:12px;'>🌐 Language</label>
    <select id='langpick'></select>
  </div>
</div>
<div class='hero'>
  <h1>NovaClip Studio</h1>
  <div id='authbox' style='margin:20px 0 10px'>
    <button id='gbtn' style='padding:12px 28px; border-radius:30px; border:none; font-weight:700; cursor:pointer; background:white; color:#333;'>🔑 Sign in with Google</button>
    <p id='uname' style='display:none; color:#4CC9F0; font-weight:700;'></p>
  </div>
  <div id='toolbar' style='display:none;'>
    <button id='statsbtn' class='toolbtn'>📈 My analytics</button>
    <button id='compbtn' class='toolbtn'>🥊 Closest competitors</button>
    <button id='duelbtn' class='toolbtn'>⚔️ Duel a channel</button>
    <button id='trendbtn' class='toolbtn'>🔥 Trending topics</button>
  </div>
  <div id='statspanel' class='panelbox'>
    <label class='toggle'><input type='checkbox' id='compToggle'> Compare with competitors</label>
    <div id='statstext'></div>
    <canvas id='statschart' height='220'></canvas>
  </div>
  <div id='duelsetup' class='panelbox'>
    <b>⚔️ Views and subs duel (max 20k subs difference between channels)</b><br><br>
    <input id='duelbox' placeholder='Opponent channel name...'>
    <button id='duelgo' class='smallbtn'>Fight!</button>
  </div>
  <div id='toolout' class='panelbox'></div>
  <p style='opacity:0.6; margin-top:30px;'>Win a duel: +20 pts 🏆 · AI questions and thumbnails earn points too (✨ in the sidebar)</p>
</div>

<script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: 'AIzaSyCKJVKqArOofTZT4fiz18cs_-thLB1O2J4',
  authDomain: 'novaclip-eaf8c.firebaseapp.com',
  projectId: 'novaclip-eaf8c',
  storageBucket: 'novaclip-eaf8c.firebasestorage.app',
  messagingSenderId: '299962701489',
  appId: '1:299962701489:web:766f4ea8632830c625b490'
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
let ytToken = null;
let myStats = null;
let myChart = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    const p = document.getElementById('uname');
    p.style.display = 'block';
    p.textContent = '👤 ' + user.displayName + ' (tap a tool to load your channel)';
    document.getElementById('gbtn').textContent = '🔄 Reconnect YouTube';
    document.getElementById('toolbar').style.display = 'block';
  }
});

function yt(url) { return fetch('https://www.googleapis.com/youtube/v3/' + url, { headers: { Authorization: 'Bearer ' + ytToken } }).then(r => r.json()); }
function show(html) { const box = document.getElementById('toolout'); box.style.display = 'block'; box.innerHTML = html; }

async function connect() {
  const provider = new GoogleAuthProvider();
  provider.addScope('https://www.googleapis.com/auth/youtube.readonly');
  const result = await signInWithPopup(auth, provider);
  ytToken = GoogleAuthProvider.credentialFromResult(result).accessToken;
  const data = await yt('channels?part=statistics,snippet,contentDetails&mine=true');
  if (data.items && data.items.length) {
    myStats = data.items[0];
    document.getElementById('gbtn').style.display = 'none';
    const p = document.getElementById('uname');
    p.style.display = 'block';
    p.textContent = '👤 ' + myStats.snippet.title;
    document.getElementById('toolbar').style.display = 'block';
  }
}
document.getElementById('gbtn').onclick = connect;

async function ensureToken() { if (!ytToken || !myStats) await connect(); }

async function getCompetitors() {
  const q = encodeURIComponent(myStats.snippet.title.split(' ')[0]);
  const sd = await yt('search?part=snippet&type=channel&maxResults=15&q=' + q);
  const ids = sd.items.map(i => i.snippet.channelId).filter(id => id !== myStats.id).join(',');
  const cd = await yt('channels?part=statistics,snippet&id=' + ids);
  const mySubs = parseInt(myStats.statistics.subscriberCount);
  return cd.items.map(ch => ({ name: ch.snippet.title, subs: parseInt(ch.statistics.subscriberCount || 0), diff: Math.abs(parseInt(ch.statistics.subscriberCount || 0) - mySubs) })).sort((a, b) => a.diff - b.diff).slice(0, 5);
}

async function drawStats() {
  await ensureToken();
  const panel = document.getElementById('statspanel');
  panel.style.display = 'block';
  const withComp = document.getElementById('compToggle').checked;
  const s = myStats.statistics;
  document.getElementById('statstext').innerHTML = '<b>📈 ' + myStats.snippet.title + '</b><br>Subscribers: ' + parseInt(s.subscriberCount).toLocaleString() + ' · Views: ' + parseInt(s.viewCount).toLocaleString() + ' · Videos: ' + s.videoCount;
  let labels = [], values = [], colors = [], title = '';
  if (withComp) {
    title = 'Subscribers vs competitors';
    const comps = await getCompetitors();
    labels = ['You'].concat(comps.map(c => c.name.slice(0, 12)));
    values = [parseInt(s.subscriberCount)].concat(comps.map(c => c.subs));
    colors = ['#F72585'].concat(comps.map(() => '#4CC9F0'));
  } else {
    title = 'Your top videos by views';
    const uploads = myStats.contentDetails.relatedPlaylists.uploads;
    const pl = await yt('playlistItems?part=contentDetails&playlistId=' + uploads + '&maxResults=50');
    if (pl.items && pl.items.length) {
      const ids = pl.items.map(i => i.contentDetails.videoId).join(',');
      const vs = await yt('videos?part=snippet,statistics&id=' + ids);
      const vids = vs.items.map(v => ({ title: v.snippet.title, views: parseInt(v.statistics.viewCount || 0) })).sort((a, b) => b.views - a.views).slice(0, 8);
      labels = vids.map(v => v.title.slice(0, 14));
      values = vids.map(v => v.views);
      colors = vids.map(() => '#7209B7');
    }
  }
  if (myChart) myChart.destroy();
  const txtColor = getComputedStyle(document.body).getPropertyValue('--txt');
  myChart = new Chart(document.getElementById('statschart'), {
    type: 'bar',
    data: { labels: labels, datasets: [{ label: title, data: values, backgroundColor: colors, borderRadius: 6 }] },
    options: { plugins: { legend: { labels: { color: txtColor } } }, scales: { x: { ticks: { color: txtColor, font: { size: 9 } } }, y: { ticks: { color: txtColor } } } }
  });
}

document.getElementById('statsbtn').onclick = drawStats;
document.getElementById('compToggle').onchange = drawStats;

document.getElementById('compbtn').onclick = async () => {
  await ensureToken();
  show('Scouting your rivals...');
  const comps = await getCompetitors();
  show('<b>🥊 Channels closest to your size:</b><br>' + comps.map((r, i) => (i + 1) + '. ' + r.name + ' — ' + r.subs.toLocaleString() + ' subs').join('<br>'));
};

document.getElementById('duelbtn').onclick = () => { const d = document.getElementById('duelsetup'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; };

document.getElementById('duelgo').onclick = async () => {
  await ensureToken();
  const name = document.getElementById('duelbox').value;
  if (!name) return;
  show('Preparing the arena...');
  const mySubs = parseInt(myStats.statistics.subscriberCount);
  const myViews = parseInt(myStats.statistics.viewCount);
  const sd = await yt('search?part=snippet&type=channel&maxResults=1&q=' + encodeURIComponent(name));
  if (!sd.items || !sd.items.length) { show('Could not find that channel.'); return; }
  const cd = await yt('channels?part=statistics,snippet&id=' + sd.items[0].snippet.channelId);
  const opp = cd.items[0];
  const oppSubs = parseInt(opp.statistics.subscriberCount || 0);
  const oppViews = parseInt(opp.statistics.viewCount || 0);
  const gap = Math.abs(mySubs - oppSubs);
  if (gap > 20000) { show('⚔️ Unfair matchup! The gap is ' + gap.toLocaleString() + ' subs — max allowed is 20,000. Pick someone closer!'); return; }
  let a = 0, b = 0;
  if (mySubs >= oppSubs) a++; else b++;
  if (myViews >= oppViews) a++; else b++;
  const winner = a > b ? myStats.snippet.title : (b > a ? opp.snippet.title : 'It is a TIE');
  show('<b>⚔️ DUEL RESULT</b><br><br>' + myStats.snippet.title + ': ' + mySubs.toLocaleString() + ' subs · ' + myViews.toLocaleString() + ' views<br>' + opp.snippet.title + ': ' + oppSubs.toLocaleString() + ' subs · ' + oppViews.toLocaleString() + ' views<br><br>🏆 <b>Winner: ' + winner + '</b>');
  if (a > b) addPts(20);
};

document.getElementById('trendbtn').onclick = async () => {
  await ensureToken();
  show('Checking what is hot right now...');
  const t = await yt('videos?part=snippet,statistics&chart=mostPopular&regionCode=PT&maxResults=8');
  show('<b>🔥 Trending on YouTube right now:</b><br>' + t.items.map((v, i) => (i + 1) + '. ' + v.snippet.title + ' — ' + parseInt(v.statistics.viewCount).toLocaleString() + ' views').join('<br>'));
};
</script>
<script src='nova.js'></script>
</body>
</html>
