<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>NovaClip Studio</title>
<script src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
body { background: #060608; color: #f4f4f6; overflow-x: hidden; }

.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: rgba(12,12,16,0.85); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: stretch; padding: 20px 0; gap: 8px; z-index: 998; border-right: 1px solid rgba(255,255,255,0.06); }
.sidebar a { font-size: 1.05rem; text-decoration: none; color: #f4f4f6; display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-weight: 600; transition: background 0.2s; }
.sidebar a:hover { background: rgba(114,9,183,0.25); }
.sidebar a.aidot { background: linear-gradient(135deg, #F72585, #7209B7, #4CC9F0); color: white; border-radius: 12px; margin: 6px 14px; }
.sidebar .themewrap { margin-top: auto; padding: 16px 20px; }
.sidebar .themewrap label { display: block; font-size: 0.78rem; opacity: 0.6; margin-bottom: 6px; }
.sidebar select { width: 100%; font-size: 0.95rem; background: rgba(255,255,255,0.05); color: #f4f4f6; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 9px; }

#orbs { position: fixed; inset: 0; left: 200px; z-index: 0; pointer-events: none; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.35; }
.orb.a { width: 440px; height: 440px; background: #7209B7; top: -80px; left: 15%; animation: f1 16s ease-in-out infinite; }
.orb.b { width: 380px; height: 380px; background: #F72585; bottom: -60px; right: 10%; animation: f2 19s ease-in-out infinite; }
@keyframes f1 { 0%,100% { transform: translate(0,0);} 50% { transform: translate(50px,60px);} }
@keyframes f2 { 0%,100% { transform: translate(0,0);} 50% { transform: translate(-50px,-40px);} }

.hero { position: relative; z-index: 2; min-height: 100vh; margin-left: 200px; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px; }
h1 { font-size: clamp(2.2rem,5vw,3.4rem); font-weight: 800; letter-spacing: -2px; }
h1 .grad { background: linear-gradient(90deg, #F72585, #7209B7, #4CC9F0); -webkit-background-clip: text; background-clip: text; color: transparent; }
.gbtn { padding: 14px 32px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; background: #fff; color: #222; margin: 24px 0 10px; font-size: 1rem; transition: transform 0.2s; }
.gbtn:hover { transform: translateY(-2px); }
#uname { display: none; color: #4CC9F0; font-weight: 700; }
.toolbtn { margin: 6px; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; background: rgba(255,255,255,0.06); color: #4CC9F0; border: 1px solid rgba(76,201,240,0.5); transition: transform 0.2s, background 0.2s; }
.toolbtn:hover { transform: translateY(-2px); background: rgba(76,201,240,0.15); }
.panelbox { margin-top: 16px; text-align: left; display: none; background: rgba(255,255,255,0.04); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px; padding: 20px; max-width: 780px; width: 100%; }
#duelbox { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #f4f4f6; }
.smallbtn { margin-top: 10px; padding: 10px 18px; border-radius: 24px; border: none; cursor: pointer; font-weight: 700; color: white; background: linear-gradient(90deg, #F72585, #7209B7); }
.toggle { display: inline-flex; align-items: center; gap: 8px; margin: 4px 0 14px; font-weight: 700; cursor: pointer; }
.toggle input { width: 18px; height: 18px; }
.chartgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 12px; }
.chartcard { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px; }
.chartcard h4 { font-size: 0.9rem; margin-bottom: 8px; text-align: center; opacity: 0.85; }
@media (max-width: 640px) { .chartgrid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class='sidebar'>
  <a href='index.html' data-t='home'>🏠 Home</a>
  <a href='app.html' data-t='studio'>📈 Studio</a>
  <a href='trends.html' data-t='trends'>🛰️ Trend Spotter</a>
  <a href='editor.html'>🎬 Editor</a>
  <a href='game.html'>🎯 Sniper</a>
  <a href='ai.html' class='aidot' data-t='ai'>✨ NovaClip AI</a>
  <div class='themewrap'>
    <label data-t='background'>Background</label>
    <select id='themepick'></select>
    <label style='margin-top:12px;' data-t='language'>Language</label>
    <select id='langpick'></select>
  </div>
</div>

<div id='orbs'><div class='orb a'></div><div class='orb b'></div></div>

<div class='hero'>
  <h1><span class='grad' data-t='studio_h'>NovaClip Studio</span></h1>
  <div>
    <button id='gbtn' class='gbtn' data-t='signin'>🔑 Sign in with Google</button>
    <p id='uname'></p>
  </div>
  <div id='toolbar' style='display:none;'>
    <button id='statsbtn' class='toolbtn' data-t='t_stats'>📈 My analytics</button>
    <button id='compbtn' class='toolbtn' data-t='t_comp'>🥊 Closest competitors</button>
    <button id='duelbtn' class='toolbtn' data-t='t_duel'>⚔️ Duel a channel</button>
    <button id='trendbtn' class='toolbtn' data-t='t_trend'>🔥 Trending topics</button>
  </div>
  <div id='statspanel' class='panelbox'>
    <label class='toggle'><input type='checkbox' id='compToggle' checked> <span data-t='compare'>Compare with 2 competitors</span></label>
    <div id='statstext'></div>
    <div class='chartgrid'>
      <div class='chartcard'><h4>👥 Subscribers</h4><canvas id='c_subs' height='150'></canvas></div>
      <div class='chartcard'><h4>👁️ Total views</h4><canvas id='c_views' height='150'></canvas></div>
      <div class='chartcard'><h4>👍 Likes (recent)</h4><canvas id='c_likes' height='150'></canvas></div>
      <div class='chartcard'><h4>💬 Comments (recent)</h4><canvas id='c_comments' height='150'></canvas></div>
      <div class='chartcard'><h4>🎬 Videos</h4><canvas id='c_videos' height='150'></canvas></div>
      <div class='chartcard'><h4>⭐ Overall score</h4><canvas id='c_overall' height='150'></canvas></div>
    </div>
  </div>
  <div id='duelsetup' class='panelbox'>
    <b data-t='duel_label'>⚔️ Views and subs duel (max 20k subs difference between channels)</b><br><br>
    <input id='duelbox' data-tph='opp_ph' placeholder='Opponent channel name...'>
    <button id='duelgo' class='smallbtn' data-t='fight'>Fight!</button>
  </div>
  <div id='toolout' class='panelbox'></div>
</div>

<script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: 'AIzaSyCKJVKqArOofTZT4fiz18cs_-thLB1O2J4',
  authDomain: 'novaclip-eaf8c.firebaseapp.com',
  projectId: 'novaclip-eaf8c',
  storageBucket: 'novaclip-eaf8c.firebasestorage.app',
  messagingSenderId: '299962701489',
  appId: '1:299962701489:web:766f4ea8632830c625b490'
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
let ytToken = null, myStats = null;
const charts = {};

onAuthStateChanged(auth, (user) => {
  if (user) {
    const p = document.getElementById('uname');
    p.style.display = 'block';
    p.textContent = '👤 ' + user.displayName + ' (tap a tool to load your channel)';
    document.getElementById('gbtn').textContent = '🔄 Reconnect YouTube';
    document.getElementById('toolbar').style.display = 'block';
  }
});

function yt(url) { return fetch('https://www.googleapis.com/youtube/v3/' + url, { headers: { Authorization: 'Bearer ' + ytToken } }).then(r => r.json()); }
function show(html) { const box = document.getElementById('toolout'); box.style.display = 'block'; box.innerHTML = html; }

async function connect() {
  const provider = new GoogleAuthProvider();
  provider.addScope('https://www.googleapis.com/auth/youtube.readonly');
  const result = await signInWithPopup(auth, provider);
  ytToken = GoogleAuthProvider.credentialFromResult(result).accessToken;
  const data = await yt('channels?part=statistics,snippet,contentDetails&mine=true');
  if (data.items && data.items.length) {
    myStats = data.items[0];
    document.getElementById('gbtn').style.display = 'none';
    const p = document.getElementById('uname');
    p.style.display = 'block'; p.textContent = '👤 ' + myStats.snippet.title;
    document.getElementById('toolbar').style.display = 'block';
  }
}
document.getElementById('gbtn').onclick = connect;
async function ensureToken() { if (!ytToken || !myStats) await connect(); }

async function recentEngagement(channel) {
  const uploads = channel.contentDetails && channel.contentDetails.relatedPlaylists && channel.contentDetails.relatedPlaylists.uploads;
  if (!uploads) return { likes: 0, comments: 0 };
  const pl = await yt('playlistItems?part=contentDetails&playlistId=' + uploads + '&maxResults=20');
  if (!pl.items || !pl.items.length) return { likes: 0, comments: 0 };
  const ids = pl.items.map(i => i.contentDetails.videoId).join(',');
  const vs = await yt('videos?part=statistics&id=' + ids);
  let likes = 0, comments = 0;
  vs.items.forEach(v => { likes += parseInt(v.statistics.likeCount || 0); comments += parseInt(v.statistics.commentCount || 0); });
  return { likes, comments };
}

async function getTwoCompetitors() {
  const q = encodeURIComponent(myStats.snippet.title.split(' ')[0]);
  const sd = await yt('search?part=snippet&type=channel&maxResults=15&q=' + q);
  const ids = sd.items.map(i => i.snippet.channelId).filter(id => id !== myStats.id).slice(0, 10).join(',');
  const cd = await yt('channels?part=statistics,snippet,contentDetails&id=' + ids);
  const mySubs = parseInt(myStats.statistics.subscriberCount);
  return cd.items.map(ch => ({ ch, diff: Math.abs(parseInt(ch.statistics.subscriberCount || 0) - mySubs) })).sort((a, b) => a.diff - b.diff).slice(0, 2).map(x => x.ch);
}

function makeChart(id, labels, values, colors) {
  if (charts[id]) charts[id].destroy();
  const txt = '#c8ccd8';
  charts[id] = new Chart(document.getElementById(id), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: txt, font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.05)' } }, y: { ticks: { color: txt, font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.05)' } } } }
  });
}

async function drawStats() {
  await ensureToken();
  document.getElementById('statspanel').style.display = 'block';
  const withComp = document.getElementById('compToggle').checked;
  const s = myStats.statistics;
  document.getElementById('statstext').innerHTML = '<b>📈 ' + myStats.snippet.title + '</b>';
  let channels = [myStats];
  if (withComp) { try { channels = channels.concat(await getTwoCompetitors()); } catch (e) {} }
  const labels = channels.map((c, i) => i === 0 ? 'You' : c.snippet.title.slice(0, 12));
  const colors = channels.map((c, i) => i === 0 ? '#F72585' : (i === 1 ? '#4CC9F0' : '#4CC96A'));
  const subs = channels.map(c => parseInt(c.statistics.subscriberCount || 0));
  const views = channels.map(c => parseInt(c.statistics.viewCount || 0));
  const videos = channels.map(c => parseInt(c.statistics.videoCount || 0));
  makeChart('c_subs', labels, subs, colors);
  makeChart('c_views', labels, views, colors);
  makeChart('c_videos', labels, videos, colors);
  const eng = [];
  for (const c of channels) { eng.push(await recentEngagement(c)); }
  const likes = eng.map(e => e.likes), comments = eng.map(e => e.comments);
  makeChart('c_likes', labels, likes, colors);
  makeChart('c_comments', labels, comments, colors);
  const metrics = [subs, views, videos, likes, comments];
  const overall = labels.map((_, idx) => { let sc = 0; metrics.forEach(arr => { const mx = Math.max(...arr, 1); sc += (arr[idx] / mx) * 20; }); return Math.round(sc); });
  makeChart('c_overall', labels, overall, colors);
}
document.getElementById('statsbtn').onclick = drawStats;
document.getElementById('compToggle').onchange = drawStats;

document.getElementById('compbtn').onclick = async () => {
  await ensureToken();
  show('Scouting your rivals...');
  const comps = await getTwoCompetitors();
  show('<b>🥊 Your 2 closest competitors:</b><br>' + comps.map((c, i) => (i + 1) + '. ' + c.snippet.title + ' — ' + parseInt(c.statistics.subscriberCount || 0).toLocaleString() + ' subs').join('<br>'));
};

document.getElementById('duelbtn').onclick = () => { const d = document.getElementById('duelsetup'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; };

document.getElementById('duelgo').onclick = async () => {
  await ensureToken();
  const name = document.getElementById('duelbox').value;
  if (!name) return;
  show('Preparing the arena...');
  const mySubs = parseInt(myStats.statistics.subscriberCount);
  const myViews = parseInt(myStats.statistics.viewCount);
  const sd = await yt('search?part=snippet&type=channel&maxResults=1&q=' + encodeURIComponent(name));
  if (!sd.items || !sd.items.length) { show('Could not find that channel.'); return; }
  const cd = await yt('channels?part=statistics,snippet&id=' + sd.items[0].snippet.channelId);
  const opp = cd.items[0];
  const oppSubs = parseInt(opp.statistics.subscriberCount || 0), oppViews = parseInt(opp.statistics.viewCount || 0);
  const gap = Math.abs(mySubs - oppSubs);
  if (gap > 20000) { show('⚔️ Unfair matchup! The gap is ' + gap.toLocaleString() + ' subs — max allowed is 20,000. Pick someone closer!'); return; }
  let a = 0, b = 0;
  if (mySubs >= oppSubs) a++; else b++;
  if (myViews >= oppViews) a++; else b++;
  const winner = a > b ? myStats.snippet.title : (b > a ? opp.snippet.title : 'It is a TIE');
  show('<b>⚔️ DUEL RESULT</b><br><br>' + myStats.snippet.title + ': ' + mySubs.toLocaleString() + ' subs · ' + myViews.toLocaleString() + ' views<br>' + opp.snippet.title + ': ' + oppSubs.toLocaleString() + ' subs · ' + oppViews.toLocaleString() + ' views<br><br>🏆 <b>Winner: ' + winner + '</b>');
  if (a > b) addPts(20);
};

document.getElementById('trendbtn').onclick = async () => {
  await ensureToken();
  show('Checking what is hot right now...');
  const t = await yt('videos?part=snippet,statistics&chart=mostPopular&regionCode=PT&maxResults=8');
  show('<b>🔥 Trending on YouTube right now:</b><br>' + t.items.map((v, i) => (i + 1) + '. ' + v.snippet.title + ' — ' + parseInt(v.statistics.viewCount).toLocaleString() + ' views').join('<br>'));
};
</script>
<script src='nova.js'></script>
</body>
</html>
